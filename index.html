<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swar-Takshari | The Ultimate Bollywood Singing Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&family=Hind:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-accent: #10b981; /* Emerald 500 */
            --secondary-accent: #06b6d4; /* Cyan 500 */
            --bg-base: #ffffff;
            --bg-panel: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --spotlight-color: rgba(16, 185, 129, 0.05);
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
        }

        body.midnight {
            --bg-base: #000000;
            --bg-panel: #111111;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --spotlight-color: rgba(45, 212, 191, 0.08);
            background-color: var(--bg-base);
            color: var(--text-main);
        }

        .hindi-font {
            font-family: 'Hind', sans-serif;
        }
        .heading-font {
            font-family: 'Cinzel', serif;
        }
        
        .ocean-gradient-text {
            background: linear-gradient(180deg, #059669 0%, #10b981 50%, #064e3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mint-gradient-text {
            background: linear-gradient(180deg, #2dd4bf 0%, #06b6d4 50%, #0891b2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ocean-glow {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .mint-glow {
            text-shadow: 0 0 20px rgba(45, 212, 191, 0.5);
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        body.midnight .glass-panel {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.5);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 10px;
        }
        body.midnight ::-webkit-scrollbar-thumb {
            background: #2dd4bf;
        }

        @keyframes spotlight {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .spotlight {
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 150vw;
            height: 120vh;
            background: radial-gradient(circle, var(--spotlight-color) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: spotlight 10s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="luxury">
    <div class="spotlight"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
